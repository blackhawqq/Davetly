  <!-- small sprigs -->
  <path d="M10 5 l-6 -4 M14 9 l-4 -7 M18 13 l-2 -8" stroke-width="1"/>
  <path d="M150 130 l8 4 M155 135 l5 8 M160 140 l2 9" stroke-width="1"/>
