    <ellipse cx="-5" cy="7" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.3" transform="rotate(216 -5 7)"/>
    <ellipse cx="-8" cy="-3" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.3" transform="rotate(288 -8 -3)"/>
    <circle cx="0" cy="0" r="3" fill="#d9b873" fill-opacity="0.6"/>
  </g>

  <g transform="translate(108,95) scale(0.8)">
    <ellipse cx="0" cy="-9" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.22"/>
    <ellipse cx="8" cy="-3" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.22" transform="rotate(72 8 -3)"/>
    <ellipse cx="5" cy="7" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.22" transform="rotate(144 5 7)"/>
    <ellipse cx="-5" cy="7" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.22" transform="rotate(216 -5 7)"/>
    <ellipse cx="-8" cy="-3" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.22" transform="rotate(288 -8 -3)"/>
