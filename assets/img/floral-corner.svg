  <g transform="translate(158,142) scale(0.65)">
    <ellipse cx="0" cy="-9" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.18"/>
    <ellipse cx="8" cy="-3" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.18" transform="rotate(72 8 -3)"/>
    <ellipse cx="5" cy="7" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.18" transform="rotate(144 5 7)"/>
    <ellipse cx="-5" cy="7" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.18" transform="rotate(216 -5 7)"/>
    <ellipse cx="-8" cy="-3" rx="6" ry="9" fill="#e8edf5" fill-opacity="0.18" transform="rotate(288 -8 -3)"/>
