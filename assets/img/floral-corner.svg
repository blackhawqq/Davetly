<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#e8edf5" stroke-width="1.2" stroke-linecap="round">
  <!-- main branch -->
  <path d="M0 10 C 40 15, 70 35, 90 70 C 110 105, 130 130, 165 145"/>
  <path d="M5 0 C 45 5, 80 25, 100 60 C 120 95, 145 120, 180 130"/>

